<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Site</title>
</head>
<body>


<html>
  <head>
    <title>City Search</title>
  </head>
  <body>
    <h1>Search for a City</h1>
    <form>
      <label for="city">Enter city name:</label>
      <input type="text" id="city" name="city" />
      <button type="submit">Search</button>
    </form>
  </body>
</html>

<script src="script.js"></script>

<script>
fetch('/city-search-result')
  .then(response => response.json())
  .then(data => {
    const resultList = document.querySelector('#city-result');
    resultList.innerHTML = '';
    data.forEach(city => {
      const li = document.createElement('li');
      li.textContent = city.name;
      resultList.appendChild(li);
    });
  })
  .catch(error => console.error('Error:', error));
</script>
<style>
#city-result {
  list-style: none;
  padding: 0;
  margin: 0;
}
#city-result li {
  margin-bottom: 10px;
}
</style>
<div id="city-result"></div>

<script>
fetch('/city-favorite-list')
  .then(response => response.json())
  .then(favoriteCities => {
    const favoriteList = document.querySelector('#city-favorite-list');
    favoriteList.innerHTML = '';
    favoriteCities.forEach(city => {
      const button = document.createElement('button');
      const favoriteCount = document.createElement('span');
      button.textContent = city.name;
      favoriteCount.textContent = city.favoriteCount;
      button.appendChild(favoriteCount);
      favoriteList.appendChild(button);
    });
  })
  .catch(error => console.error('Error:', error));
</script>
<style>
#city-favorite-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

#city-favorite-list button {
  cursor: pointer;
}

#city-favorite-list span {
  color: #666;
}
</style>
<div id="city-favorite-list"></div>

<div class="loading">
  <i class="fas fa-spinner fa-spin"></i> Loading favorites...
</div>

<style>
.loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.2rem;
}
</style>

<div class="favorite-list-error">
  <i class="fas fa-exclamation-triangle fa-spin"></i> Error loading favorites...
</div>

<style>
  .favorite-list-error {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.2rem;
    display: none;
  }
</style>

<style>
  .favorite-list-loading-success {
    display: block;
  }
  .favorite-list-loading-failure {
    display: block;
  }
</style> 

<div class="favorite-list-loading-success">
  <i class="fas fa-check-circle fa-spin"></i> Favorites loaded successfully...
</div>

<div class="favorite-list-loading-failure">
  <i class="fas fa-exclamation-triangle fa-spin"></i> Error loading favorites...
</div>

<div class="favorite-list-empty">
    <i class="fas fa-exclamation-circle"></i>
    <div>No favorites added yet!</div>
  </div>
